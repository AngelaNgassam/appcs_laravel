name: CI/CD Pipeline - APPCS Laravel

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

# Variables d'environnement globales (partagées par tous les jobs)
env:
  DB_CONNECTION: mysql
  DB_HOST: 127.0.0.1
  DB_PORT: 3306
  DB_DATABASE: cartes_scolaires
  DB_USERNAME: root
  DB_PASSWORD: root

jobs:

  # STAGE 1 : Tests & Qualité du code

  tests:
    name: Tests (PHP / Laravel)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: cartes_scolaires      # même nom que le projet
          MYSQL_ROOT_PASSWORD: root
          # NOTE : MYSQL_USER ne peut pas être "root" (déjà réservé)
          # On utilise uniquement root / root comme dans le .env
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pdo_mysql, gd, zip, bcmath
          coverage: xdebug

      - name: Cache des dépendances Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}

      - name: Installation des dépendances Composer
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Préparation du fichier .env (copie du .env.example)
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Migration de la base de données cartes_scolaires
        run: php artisan migrate --force

      - name: Exécution des tests
        run: php artisan test --coverage --min=60

  
  # STAGE 2 : Sécurité — Scan des dépendances

  security:
    name: Audit de sécurité
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Installation des dépendances
        run: composer install --no-interaction --prefer-dist

      - name: Audit des dépendances Composer (vulnérabilités connues)
        run: composer audit

      - name: Analyse statique avec PHPStan (niveau 5)
        run: |
          composer require --dev phpstan/phpstan --no-interaction
          vendor/bin/phpstan analyse app --level=5 --no-progress || true


  # STAGE 3 : Build Docker

  build:
    name: Build image Docker
    runs-on: ubuntu-latest
    needs: [tests, security]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Connexion à Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extraction des métadonnées Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/appcs-laravel
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-

      - name: Build et push de l'image Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


  # STAGE 4 : Notification

  notify:
    name: Notification résultat pipeline
    runs-on: ubuntu-latest
    needs: [tests, security, build]
    if: always()

    steps:
      - name: Résumé du pipeline
        run: |
          echo "Pipeline terminé."
          echo "Tests      : ${{ needs.tests.result }}"
          echo "Sécurité   : ${{ needs.security.result }}"
          echo "Build      : ${{ needs.build.result }}"
