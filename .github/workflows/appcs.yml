name: CI/CD Pipeline - APPCS Laravel

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

# Variables globales partagées par tous les jobs
env:
  DB_CONNECTION: mysql
  DB_HOST: 127.0.0.1
  DB_PORT: 3306
  DB_DATABASE: cartes_scolaires
  DB_USERNAME: root
  DB_PASSWORD: root

jobs:

  # STAGE 1 : LINTING - Qualité du code PHP

  lint:
    name: Linting (Qualité du code)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4 # Récupère ton code

      - name: Configuration PHP 8.4
        uses: shivammathur/setup-php@v2 #Installe PHP 8.4
        with:
          php-version: '8.4'
          tools: cs2pr

      - name: Installation des dépendances Composer
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: PHP-CS-Fixer - Vérification du style (respecte les normes PHP) de code (PSR-12)
        run: |
          composer require --dev friendsofphp/php-cs-fixer --no-interaction
          vendor/bin/php-cs-fixer fix --dry-run --diff --format=checkstyle app/ \
            | cs2pr || true

      - name: PHPStan — Analyse statique intelligente du code (détection des erreurs)
        run: |
          composer require --dev phpstan/phpstan --no-interaction
          vendor/bin/phpstan analyse app --level=5 --no-progress \
            --memory-limit=512M \
            --error-format=github \
            --configuration=phpstan.neon || true

      - name: Laravel Pint - Formatage du code Laravel
        run: |
          composer require --dev laravel/pint --no-interaction
          vendor/bin/pint --test || true


  # STAGE 2 : TESTS - Unitaires et Feature

  tests:
    name: Tests (PHP / Laravel)
    runs-on: ubuntu-latest
    needs: lint
    # Simule une vraie base de données
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: cartes_scolaires
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pdo_mysql, gd, zip, bcmath
          coverage: xdebug #couverture de tests

      - name: Cache des dépendances Composer #accélerer les builds
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}

      - name: Installation des dépendances Composer
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Préparation du fichier .env
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Migration de la base de données
        run: php artisan migrate --force

      - name: Exécution des tests
        run: php artisan test --log-junit test-results.xml

      - name: Publication des résultats de tests
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results.xml


  # STAGE 3 : SÉCURITÉ(librairies vulnérables, CVE connues) - Audit des dépendances

  security:
    name: Audit de sécurité
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Installation des dépendances
        run: composer install --no-interaction --prefer-dist

      - name: Audit des dépendances Composer (CVE connues)
        run: composer audit || true

      - name: Scan de l'image Docker avec Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '0'


  # STAGE 4 : BUILD - Image Docker

  build:
    name: Build image Docker
    runs-on: ubuntu-latest
    needs: [tests, security]

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Connexion à Docker Hub pour push l’image
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extraction des métadonnées Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/appcs-laravel
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}

      - name: Build et push de l'image Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


  # STAGE 5 : CD STAGING - Déploiement simulé

  deploy-staging:
    name: Déploiement Staging (CD)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/develop'

    environment:
      name: staging
      url: http://localhost:8000

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Simulation déploiement staging
        run: |
          echo "=== Déploiement APPCS Laravel sur Staging ==="
          echo "Image   : ${{ needs.build.outputs.image-tag }}"
          echo "Branche : ${{ github.ref_name }}"
          echo "Commit  : ${{ github.sha }}"
          echo "Auteur  : ${{ github.actor }}"
          echo "Statut  : Déploiement simulé (pas de serveur distant configuré)"
          echo "=== Staging terminé avec succès ==="


  # STAGE 6 : CD PRODUCTION — Déploiement simulé

  deploy-production:
    name: Déploiement Production (CD Manuel)
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/master'

    environment:
      name: production
      url: http://localhost:8000

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Simulation déploiement production
        run: |
          echo "=== Déploiement APPCS Laravel en Production ==="
          echo "Image   : ${{ needs.build.outputs.image-tag }}"
          echo "Branche : ${{ github.ref_name }}"
          echo "Commit  : ${{ github.sha }}"
          echo "Statut  : Déploiement simulé (approbation manuelle requise en prod réelle)"
          echo "=== Production terminée ==="


  # STAGE 7 : NOTIFICATION — Résultat du pipeline

  notify:
    name: Notification résultat pipeline
    runs-on: ubuntu-latest
    needs: [lint, tests, security, build, deploy-staging]
    if: always()

    steps:
      - name: Résumé complet du pipeline
        run: |
          echo "╔══════════════════════════════════════╗"
          echo "║     RAPPORT PIPELINE CI/CD APPCS     ║"
          echo "╚══════════════════════════════════════╝"
          echo "Branche      : ${{ github.ref_name }}"
          echo "Commit       : ${{ github.sha }}"
          echo "Auteur       : ${{ github.actor }}"
          echo "──────────────────────────────────────"
          echo "Linting      : ${{ needs.lint.result }}"
          echo "Tests        : ${{ needs.tests.result }}"
          echo "Sécurité     : ${{ needs.security.result }}"
          echo "Build Docker : ${{ needs.build.result }}"
          echo "Staging      : ${{ needs.deploy-staging.result }}"
          echo "──────────────────────────────────────"
