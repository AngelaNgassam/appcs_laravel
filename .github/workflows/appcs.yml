name: CI/CD Pipeline - APPCS Laravel (Amélioré v2)

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

env:
  DB_CONNECTION: mysql
  DB_HOST: 127.0.0.1
  DB_PORT: 3306
  DB_DATABASE: cartes_scolaires
  DB_USERNAME: root
  DB_PASSWORD: root

jobs:


  # STAGE 1 : LINTING — Qualité du code PHP

  lint:
    name: Linting (Qualité du code)
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: cs2pr

      - name: Installation des dépendances Composer
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: PHP-CS-Fixer — Style PSR-12
        run: |
          composer require --dev friendsofphp/php-cs-fixer --no-interaction
          vendor/bin/php-cs-fixer fix --dry-run --diff --format=checkstyle app/ \
            | cs2pr || true

      - name: PHPStan — Analyse statique niveau 5
        run: |
          composer require --dev phpstan/phpstan --no-interaction
          vendor/bin/phpstan analyse app --level=5 --no-progress \
            --memory-limit=512M --error-format=github \
            --configuration=phpstan.neon || true

      - name: Laravel Pint — Formatage Laravel
        run: |
          composer require --dev laravel/pint --no-interaction
          vendor/bin/pint --test || true


  # STAGE 2 : TESTS — Unitaires et Feature

  tests:
    name: Tests (PHP / Laravel)
    runs-on: ubuntu-latest
    needs: lint

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: cartes_scolaires
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pdo_mysql, gd, zip, bcmath
          coverage: xdebug

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}

      - name: Installation des dépendances
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Préparation .env
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Migration base de données
        run: php artisan migrate --force

      - name: Exécution des tests
        run: php artisan test --log-junit test-results.xml

      - name: Publication résultats tests
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results.xml


  # STAGE 3 : SONARCLOUD — Scan qualité et sécurité du code
  # Détecte : bugs, vulnérabilités SQL/XSS, code smells
  # Résultats visibles sur https://sonarcloud.io

  sonarcloud:
    name: Scan SonarCloud (Qualité & Sécurité)
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Checkout du code (historique complet requis par SonarCloud)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan SonarCloud
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=AngelaNgassam_appcs_laravel
            -Dsonar.organization=angelangassam
            -Dsonar.sources=app
            -Dsonar.tests=tests
            -Dsonar.host.url=https://sonarcloud.io


  # STAGE 4 : SÉCURITÉ — Audit dépendances + Trivy

  security:
    name: Audit de sécurité
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Installation des dépendances
        run: composer install --no-interaction --prefer-dist

      - name: Audit Composer (CVE connues)
        run: composer audit || true

      - name: Scan Trivy — Vulnérabilités filesystem
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '0'


  # STAGE 5 : BUILD — Image Docker

  build:
    name: Build image Docker
    runs-on: ubuntu-latest
    needs: [tests, security, sonarcloud]

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Connexion Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Métadonnées Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/appcs-laravel
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}

      - name: Build et push image Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


  # STAGE 6 : TESTS DE PERFORMANCE — k6
  # Simule 20 utilisateurs, vérifie P95 < 2s et erreurs < 5%

  performance:
    name: Tests de performance (k6)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation k6
        run: |
          curl https://github.com/grafana/k6/releases/download/v0.49.0/k6-v0.49.0-linux-amd64.tar.gz \
            -L -o k6.tar.gz
          tar -xzf k6.tar.gz
          sudo mv k6-v0.49.0-linux-amd64/k6 /usr/local/bin/
          k6 version

      - name: Installation PHP + dépendances
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Démarrage de l'application pour les tests
        run: |
          cp .env.example .env
          php -r "echo 'APP_KEY=base64:'.base64_encode(random_bytes(32)).PHP_EOL;" >> .env
          composer install --no-interaction --prefer-dist --optimize-autoloader
          php artisan serve --host=0.0.0.0 --port=8080 &
          sleep 8
          curl -s -o /dev/null -w "HTTP %{http_code}" http://localhost:8080 || true
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: /tmp/test.sqlite

      - name: Exécution des tests de performance k6
        run: |
          k6 run --out json=k6-results.json k6/performance-test.js \
            -e BASE_URL=http://localhost:8080 || true

      - name: Publication résultats performance
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-performance-results
          path: k6-results.json


  # STAGE 7 : CD STAGING — Déploiement simulé

  deploy-staging:
    name: Déploiement Staging (CD)
    runs-on: ubuntu-latest
    needs: [build, performance]
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/develop'

    environment:
      name: staging
      url: http://localhost:8080

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Simulation déploiement staging
        run: |
          echo "=== Déploiement APPCS Laravel sur Staging ==="
          echo "Image   : ${{ needs.build.outputs.image-tag }}"
          echo "Branche : ${{ github.ref_name }}"
          echo "Commit  : ${{ github.sha }}"
          echo "Auteur  : ${{ github.actor }}"
          echo "Statut  : Déploiement simulé"
          echo "=== Staging terminé avec succès ==="


  # STAGE 8 : CD PRODUCTION — Approbation manuelle requise

  deploy-production:
    name: Déploiement Production (CD Manuel)
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/master'

    environment:
      name: production
      url: http://localhost:8080

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Simulation déploiement production
        run: |
          echo "=== Déploiement APPCS Laravel en Production ==="
          echo "Image   : ${{ needs.build.outputs.image-tag }}"
          echo "Commit  : ${{ github.sha }}"
          echo "Statut  : Approbation manuelle requise en prod réelle"
          echo "=== Production terminée ==="


  # STAGE 9 : NOTIFICATION — Résumé complet du pipeline

  notify:
    name: Notification résultat pipeline
    runs-on: ubuntu-latest
    needs: [lint, tests, sonarcloud, security, build, performance, deploy-staging]
    if: always()

    steps:
      - name: Résumé complet du pipeline
        run: |
          echo " RAPPORT PIPELINE CI/CD APPCS "
          echo "Branche      : ${{ github.ref_name }}"
          echo "Commit       : ${{ github.sha }}"
          echo "Auteur       : ${{ github.actor }}"
          echo "──────────────────────────────────────────"
          echo "Linting      : ${{ needs.lint.result }}"
          echo "Tests        : ${{ needs.tests.result }}"
          echo "SonarCloud   : ${{ needs.sonarcloud.result }}"
          echo "Sécurité     : ${{ needs.security.result }}"
          echo "Build Docker : ${{ needs.build.result }}"
          echo "Performance  : ${{ needs.performance.result }}"
          echo "Staging      : ${{ needs.deploy-staging.result }}"
          echo "──────────────────────────────────────────"
