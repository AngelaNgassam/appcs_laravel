services:

  prometheus: # collecte les métriques de tous les autres services et stocke les données
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/prometheus/alert.rules.yml:/etc/prometheus/alert.rules.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    networks:
      - laravel_net

  grafana: # visualisation des métriques et alertes
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - laravel_net

  cadvisor: # recupere les métriques de chaque conteneur Docker
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - laravel_net

  node-exporter: # métriques système (CPU, mémoire, disque, réseau)
    image: prom/node-exporter:latest
    container_name: node_exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - laravel_net

  alertmanager: # gère les alertes envoyées par Prometheus et envoie des notifications (email, etc)
    image: prom/alertmanager:latest
    container_name: alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    networks:
      - laravel_net

  mysql-exporter: # collecte les métriques de MySQL (performances, connexions, etc)
    image: prom/mysqld-exporter:v0.15.1
    container_name: mysql-exporter
    restart: unless-stopped
    ports:
      - "9104:9104"
    volumes:
      - ./monitoring/mysql-exporter/.my.cnf:/etc/mysql/.my.cnf:ro
    command:
      - "--config.my-cnf=/etc/mysql/.my.cnf"
    networks:
      - laravel_net

  nginx-exporter: # temps de réponse et trafic HTTP
    image: nginx/nginx-prometheus-exporter:latest
    container_name: nginx_exporter
    restart: unless-stopped
    ports:
      - "9113:9113"
    command:
      - '--nginx.scrape-uri=http://nginx_server:80/stub_status'
    # depends_on:  # Commenté pour éviter l'erreur
    #   - webserver
    networks:
      - laravel_net

volumes:
  prometheus_data:
  grafana_data: 
  alertmanager_data:

networks: # réseau interne pour que les conteneurs puissent communiquer entre eux
  laravel_net:
    driver: bridge
