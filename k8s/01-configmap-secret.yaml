# ConfigMap — Variables d'environnement non sensibles
# Ces valeurs sont visibles, ne jamais mettre de mots de passe ici

apiVersion: v1
kind: ConfigMap
metadata:
  name: appcs-config
  namespace: appcs
data:
  APP_ENV: "production"
  APP_DEBUG: "false"
  APP_URL: "http://appcs.local"
  DB_CONNECTION: "mysql"
  DB_HOST: "mysql-service"      # nom du Service Kubernetes MySQL
  DB_PORT: "3306"
  DB_DATABASE: "cartes_scolaires"
  CACHE_STORE: "database"
  SESSION_DRIVER: "database"
  QUEUE_CONNECTION: "database"
  LOG_CHANNEL: "stack"
  LOG_LEVEL: "error"

---

# Secret — Données sensibles encodées en base64
# Pour encoder : echo -n "valeur" | base64
# Pour décoder : echo "dmFsZXVy" | base64 --decode

apiVersion: v1
kind: Secret
metadata:
  name: appcs-secrets
  namespace: appcs
type: Opaque
data:
  # "root" encodé en base64
  DB_USERNAME: cm9vdA==
  # "root" encodé en base64
  DB_PASSWORD: cm9vdA==
  # "root" encodé en base64 (mot de passe MySQL root)
  MYSQL_ROOT_PASSWORD: cm9vdA==
  # Clé Laravel — générer avec : php artisan key:generate --show
  APP_KEY: YmFzZTY0OmFBQkNERUZHSElKS0xNTk9QUVJTVFVWV1hZWjAxMjM0NTY=
