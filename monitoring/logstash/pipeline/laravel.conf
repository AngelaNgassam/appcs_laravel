
# Pipeline Logstash — Collecte des logs APPCS Laravel


input {
  # Logs Laravel (storage/logs/laravel.log)
  file {
    path => "/var/log/laravel/*.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    type => "laravel"
    codec => multiline {
      pattern => "^\[\d{4}-\d{2}-\d{2}"
      negate => true
      what => "previous"
    }
  }
}

filter {
  if [type] == "laravel" {
    # Parse le format Laravel : [2026-03-24 10:00:00] local.ERROR: message
    grok {
      match => {
        "message" => "\[%{TIMESTAMP_ISO8601:timestamp}\] %{DATA:environment}\.%{LOGLEVEL:level}: %{GREEDYDATA:log_message}"
      }
    }

    # Convertit le timestamp Laravel en timestamp Elasticsearch
    date {
      match => ["timestamp", "yyyy-MM-dd HH:mm:ss"]
      target => "@timestamp"
    }

    # Supprime le champ timestamp brut (redondant)
    mutate {
      remove_field => ["timestamp"]
    }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "laravel-logs-%{+YYYY.MM.dd}"
  }

  # Debug optionnel — affiche dans les logs Logstash
  # stdout { codec => rubydebug }
}
