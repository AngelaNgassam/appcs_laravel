global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'appcs-monitor'

rule_files:
  - "alert.rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:

  # Prometheus lui-même
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # CPU, RAM, réseau, disque
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'appcs-server'

  # Métriques des conteneurs Docker
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  # Métriques MySQL
  - job_name: 'mysql'
    static_configs:
      - targets: ['mysql-exporter:9104']

  # Métriques Nginx via nginx-prometheus-exporter
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx-exporter:9113']
