# ═══════════════════════════════════════════════════════════════
# Configuration Prometheus — APPCS Laravel
# Collecte les métriques toutes les 15 secondes
# ═══════════════════════════════════════════════════════════════

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'appcs-monitor'

# Règles d'alertes
rule_files:
  - "alert.rules.yml"

# Alertmanager
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# ── Cibles de collecte ──────────────────────────────────────
scrape_configs:

  # Prometheus lui-même
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Métriques système (CPU, RAM, réseau, disque)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'appcs-server'

  # Métriques des conteneurs Docker
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    metric_relabel_configs:
      - source_labels: [container_label_com_docker_compose_service]
        target_label: service

  # Métriques MySQL
  - job_name: 'mysql'
    static_configs:
      - targets: ['mysql-exporter:9104']

  # Métriques Nginx (temps de réponse, taux d'erreur)
  - job_name: 'nginx'
    static_configs:
      - targets: ['webserver:80']
    metrics_path: /stub_status
