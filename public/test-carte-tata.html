<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
    <title>Carte Scolaire - waERTJUK</title>
    <style>
        @page { 
            margin: 0; 
            size: 85.6mm 53.98mm;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body { 
            font-family: 'DejaVu Sans', Arial, sans-serif;
            font-size: 7pt;
            line-height: 1.3;
            width: 85.6mm;
            height: 53.98mm;
        }
        
        .card-container {
            width: 100%;
            height: 100%;
            position: relative;
            background: white;
            border: 3px solid #007a3d;
        }
        
        /* En-tête Cameroun avec drapeau */
        .header-cameroun {
            background: linear-gradient(to right, #007a3d 0%, #007a3d 33%, #ce1126 33%, #ce1126 66%, #fcd116 66%, #fcd116 100%);
            height: 10mm;
            position: relative;
            border-bottom: 2px solid #007a3d;
        }
        
        .header-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 1.5mm 4mm;
            border-radius: 2mm;
            text-align: center;
        }
        
        .etoile {
            color: #fcd116;
            font-size: 10pt;
            font-weight: bold;
        }
        
        .republique {
            font-size: 7pt;
            font-weight: bold;
            color: #007a3d;
            text-transform: uppercase;
        }
        
        .devise {
            font-size: 5pt;
            color: #ce1126;
            font-style: italic;
            margin-top: 0.5mm;
        }
        
        /* Corps */
        .card-body {
            padding: 3mm;
            display: table;
            width: 100%;
            height: calc(100% - 10mm - 8mm);
        }
        
        .photo-section {
            display: table-cell;
            width: 25mm;
            vertical-align: top;
        }
        
        .photo-frame {
            width: 22mm;
            height: 28mm;
            border: 2px solid #007a3d;
            border-radius: 2mm;
            overflow: hidden;
            background: #f9fafb;
        }
        
        .photo {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .info-section {
            display: table-cell;
            vertical-align: top;
            padding: 0 2mm;
        }
        
        .card-title {
            font-size: 7pt;
            font-weight: bold;
            color: #ce1126;
            text-align: center;
            margin-bottom: 2mm;
            text-transform: uppercase;
        }
        
        .info-row {
            margin-bottom: 1.5mm;
            display: table;
            width: 100%;
        }
        
        .info-label {
            font-weight: 600;
            color: #007a3d;
            font-size: 6pt;
            display: table-cell;
            width: 18mm;
        }
        
        .info-value {
            color: #1f2937;
            font-size: 7pt;
            font-weight: 500;
            display: table-cell;
        }
        
        .matricule-box {
            background: #fcd116;
            padding: 1mm 2mm;
            border-radius: 2mm;
            font-weight: bold;
            color: #000;
            border: 1px solid #007a3d;
            font-size: 7pt;
        }
        
        .classe-badge {
            background: #007a3d;
            color: white;
            padding: 1mm 2mm;
            border-radius: 2mm;
            font-weight: bold;
            font-size: 7pt;
        }
        
        .qr-section {
            display: table-cell;
            width: 20mm;
            vertical-align: top;
            text-align: center;
        }
        
        .qr-frame {
            width: 18mm;
            height: 18mm;
            background: white;
            padding: 1mm;
            border: 2px solid #007a3d;
            border-radius: 2mm;
        }
        
        .qr-code {
            width: 100%;
            height: 100%;
        }
        
        .qr-code svg {
            width: 100% !important;
            height: 100% !important;
        }
        
        .qr-label {
            font-size: 5pt;
            color: #6b7280;
            margin-top: 1mm;
            font-weight: 600;
        }
        
        .card-footer {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: #007a3d;
            padding: 1.5mm 3mm;
            display: table;
            width: 100%;
            color: white;
            font-size: 5pt;
        }
        
        .footer-left {
            display: table-cell;
            width: 33%;
        }
        
        .footer-center {
            display: table-cell;
            width: 34%;
            text-align: center;
            font-weight: bold;
            font-size: 6pt;
        }
        
        .footer-right {
            display: table-cell;
            width: 33%;
            text-align: right;
        }
    </style>
</head>
