        @page { 
            margin: 0; 
            size: 85.6mm 53.98mm;
            padding: 0;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            margin: 0;
            padding: 0;
            width: 85.6mm;
            height: 53.98mm;
        }
        
        body { 
            font-family: 'DejaVu Sans', Arial, sans-serif;
            font-size: 6pt;
        }
        
        .card {
            width: 85.6mm;
            height: 53.98mm;
            background: white;
            border: 2px solid #007a3d;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(to right, #007a3d 0%, #007a3d 33%, #ce1126 33%, #ce1126 66%, #fcd116 66%, #fcd116 100%);
            height: 7mm;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            flex-shrink: 0;
        }
        
        .header-content {
            background: rgba(255, 255, 255, 0.95);
            padding: 1mm 2mm;
            border-radius: 1mm;
            text-align: center;
            font-size: 5pt;
        }
        
        .etoile {
            color: #fcd116;
            font-size: 8pt;
            font-weight: bold;
        }
        
        .republique {
            font-size: 5pt;
            font-weight: bold;
            color: #007a3d;
            text-transform: uppercase;
            line-height: 1;
        }
        
        .devise {
            font-size: 3.5pt;
            color: #ce1126;
            font-style: italic;
        }
        
        .body {
            flex: 1;
            display: flex;
            padding: 1.5mm;
            gap: 1.5mm;
            position: relative;
        }
        
        .photo-section {
            flex-shrink: 0;
        }
        
        .photo-frame {
            width: 14mm;
            height: 18mm;
            border: 1.5px solid #007a3d;
            border-radius: 1mm;
            overflow: hidden;
            background: #f9fafb;
        }
        
        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .info-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            font-size: 5pt;
        }
        
        .school-title {
            text-align: center;
            font-size: 5.5pt;
            font-weight: bold;
            color: #ce1126;
            text-transform: uppercase;
            line-height: 1;
        }
        
        .info-row {
            display: flex;
            gap: 0.8mm;
            line-height: 1;
        }
        
        .info-label {
            font-weight: bold;
            color: #007a3d;
            min-width: 9mm;
            flex-shrink: 0;
        }
        
        .info-value {
            color: #1f2937;
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .matricule-box {
            background: #fcd116;
            padding: 0.2mm 0.6mm;
            border-radius: 0.4mm;
            font-weight: bold;
            color: #000;
            border: 0.5px solid #007a3d;
            display: inline-block;
            font-size: 5pt;
        }
        
        .classe-badge {
            background: #007a3d;
            color: white;
            padding: 0.2mm 0.6mm;
            border-radius: 0.4mm;
            font-weight: bold;
            display: inline-block;
            font-size: 5pt;
        }
        
        .qr-section {
            position: absolute;
            bottom: 5mm;
            right: 1.5mm;
            width: 10mm;
            height: 10mm;
            background: white;
            border: 1px solid #007a3d;
            border-radius: 0.5mm;
            padding: 0.3mm;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .qr-code {
            width: 100%;
            height: 100%;
        }
        
        .qr-code svg {
            width: 100% !important;
            height: 100% !important;
        }
        
        .footer {
            background: #007a3d;
            color: white;
            padding: 0.8mm 1.5mm;
            display: flex;
            justify-content: space-between;
            font-size: 3.5pt;
            border-top: 1px solid #005a2d;
            flex-shrink: 0;
            line-height: 1;
        }

</head>
